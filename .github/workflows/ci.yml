name: Check pipeline

on:
  pull_request:
    branches: [master, dev]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run bundle-vault
      - run: bun test
      - run: bun run build
