name: CI

on:
  pull_request:
    branches: [master, dev]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun test
      - run: bun run build

  changelog:
    if: github.base_ref == 'dev'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Require CHANGELOG update
        run: |
          if ! git diff --name-only origin/dev...HEAD | grep -q 'CHANGELOG.md'; then
            echo "Add your changes under '## Unreleased' in CHANGELOG.md"
            exit 1
          fi
